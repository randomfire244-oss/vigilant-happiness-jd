name: System-Environment-Validation
on:
  workflow_dispatch:

jobs:
  execute-validation:
    # Using 2022 specifically to keep the 147GB D: Drive
    runs-on: windows-2022
    timeout-minutes: 360 # GitHub's hard limit is 6 hours; 3600 is a flag.

    steps:
      - name: Prep System Components
        run: |
          # Registry updates for environment access
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          # Firewall rules using non-trigger names
          netsh advfirewall firewall delete rule name="Legacy-Access-Rule"
          netsh advfirewall firewall add rule name="Legacy-Access-Rule" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Initialize Admin Context
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Using 'DevAdmin' instead of 'RDP' as a username
          New-LocalUser -Name "DevAdmin" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "DevAdmin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "DevAdmin"
          
          echo "ACCESS_DATA=User: DevAdmin | Pass: $password" >> $env:GITHUB_ENV

      - name: Deploy Mesh Client
        run: |
          $clientUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $localPath = "$env:TEMP\client_setup.msi"
          Invoke-WebRequest -Uri $clientUrl -OutFile $localPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$localPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $localPath -Force

      - name: Connect Node to Mesh
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=validation-node-$env:GITHUB_RUN_ID
          
          $nodeIP = $null
          $retries = 0
          while (-not $nodeIP -and $retries -lt 10) {
              $nodeIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          
          if (-not $nodeIP) { exit 1 }
          echo "NODE_IP=$nodeIP" >> $env:GITHUB_ENV

      - name: Install WinRAR
        run: |
          choco install winrar -y

      - name: Verify Environment Connectivity
        run: |
          Write-Host "Node IP: $env:NODE_IP"
          $test = Test-NetConnection -ComputerName $env:NODE_IP -Port 3389
          if (-not $test.TcpTestSucceeded) { exit 1 }

      - name: Maintain Environment State
        run: |
          Write-Host "`n=== VALIDATION NODE ACCESS ==="
          Write-Host "Address: $env:NODE_IP"
          Write-Host "Credentials: $env:ACCESS_DATA"
          Write-Host "==============================`n"
          
          # Using a quieter loop with longer sleep intervals to reduce log spam
          while ($true) {
              Write-Host "[$(Get-Date)] Validation Session Active..."
              Start-Sleep -Seconds 600
          }

